    function loadState(fallback) {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return fallback;
            const parsed = JSON.parse(raw);
            return {...fallback, ...parsed};
        } catch {
            return fallback;
        }

    function Button({

        return (

                onClick={onClick}

            </button>
        );

    function EditableText({
                              value,
                              onChange,
                              className,
                              placeholder,
                              multiline = false,
                          }) {
        const ref = useRef(null);

        useEffect(() => {
            const el = ref.current;
            if (!el) return;
            const domText = multiline ? el.innerText : el.textContent;
            if ((domText || "") !== (value || "")) {
                el.innerText = value || "";
            }
        }, [value, multiline]);

        const handleBlur = () => {
            const el = ref.current;
            if (!el) return;
            const next = el.innerText.replace(/ /g, " ");
            onChange(next);
        };

        return (
            <div
                ref={ref}
                className={className}
                contentEditable
                suppressContentEditableWarning
                onBlur={handleBlur}
                data-placeholder={placeholder}
            />
        );
    }

    function DraggableItems({items, setItems, render}) {
        const dragId = useRef(null);

        const onDragStart = (id) => (e) => {
            dragId.current = id;
            e.dataTransfer.effectAllowed = "move";
            try {
                e.dataTransfer.setData("text/plain", id);
            } catch {
            }
        };

        const onDragOver = (id) => (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
        };

        const onDrop = (id) => (e) => {
            e.preventDefault();
            const fromId =
                dragId.current ||
                (() => {
                    try {
                        return e.dataTransfer.getData("text/plain");
                    } catch {
                        return null;
                    }
                })();
            if (!fromId || fromId === id) return;

            setItems((prev) => {
                const from = prev.findIndex((x) => x.id === fromId);
                const to = prev.findIndex((x) => x.id === id);
                if (from < 0 || to < 0) return prev;
                const next = [...prev];
                const [moved] = next.splice(from, 1);
                next.splice(to, 0, moved);
                return next;
            });
        };

        return (
            <div>
                {items.map((it) => (
                    <div
                        key={it.id}
                        draggable
                        onDragStart={onDragStart(it.id)}
                        onDragOver={onDragOver(it.id)}
                        onDrop={onDrop(it.id)}
                    >
                        {render(it)}
                    </div>
                ))}
            </div>
        );
    }

            });
        };

        const SectionWrapper = ({id, children}) => (
            <div
                draggable
                onDragStart={onSectionDragStart(id)}
                onDragOver={(e) => e.preventDefault()}
                onDrop={onSectionDrop(id)}
                className="group"
            >
                <div
                    className="no-print mb-1 text-[10px]"
                    style={{color: "var(--cv-muted)"}}
                >
              <span className="inline-flex items-center gap-2">
                <span className="cursor-move select-none">⇅</span>
                <span>Section verschieben</span>
              </span>
                </div>
                {children}
            </div>
        );

        // Helpers
        const updateSectionTitle = (sectionId, title) => {
            setState((s) => ({
                ...s,
                sections: {
                    ...s.sections,
                    [sectionId]: {...s.sections[sectionId], title},
                },
            }));
        };

        const addListItem = (listKey, template) => {
            setState((s) => ({
                ...s,
                [listKey]: [...s[listKey], {id: uid(listKey), ...template}],
            }));
        };

        const deleteListItem = (listKey, id) => {
            setState((s) => ({
                ...s,
                [listKey]: s[listKey].filter((x) => x.id !== id),
            }));
        };

        const updateListItem = (listKey, id, nextItem) => {
            setState((s) => ({
                ...s,
                [listKey]: s[listKey].map((x) => (x.id === id ? nextItem : x)),
            }));
        };

        const setList = (listKey) => (updater) => {
            setState((s) => {
                const next =
                    typeof updater === "function" ? updater(s[listKey]) : updater;
                return {...s, [listKey]: next};
            });
        };

        const createSection = (type) => {
            const title = window.prompt(
                "Titel der neuen Section?",
                type === "text" ? "Zusätzliche Informationen" : "Weitere Projekte",
            );
            if (!title) return;
            const id = uid("sec");

            setState((s) => {
                const next = {...s};
                next.sectionOrder = [...s.sectionOrder, id];

                const newSection = {id, type, title, column: "right"};
                if (type === "text") {
                    const contentKey = `content_${id}`;
                    newSection.contentKey = contentKey;
                    next[contentKey] = "";
                } else {
                    const listKey = `list_${id}`;
                    newSection.listKey = listKey;
                    next[listKey] = [];
                }

                next.sections = {...s.sections, [id]: newSection};
                return next;
            });
        };

        const removeSection = (sectionId) => {
            if (!window.confirm("Section wirklich löschen?")) return;
            setState((s) => {
                const sec = s.sections[sectionId];
                if (!sec) return s;

                const next = {...s};
                next.sectionOrder = s.sectionOrder.filter((id) => id !== sectionId);

                if (sec.type === "text" && sec.contentKey)
                    delete next[sec.contentKey];
                if (sec.type === "list" && sec.listKey) delete next[sec.listKey];

                const newSections = {...s.sections};
                delete newSections[sectionId];
                next.sections = newSections;
                return next;
            });
        };

        const renderSection = (sectionId) => {
            const sec = state.sections[sectionId];
            if (!sec) return null;

            const titleNode = (
                <EditableText
                    value={sec.title}
                    onChange={(v) => updateSectionTitle(sectionId, v)}
                    className="text-xs font-bold tracking-[0.22em] uppercase px-3 py-1 rounded"
                    placeholder="Section Titel"
                />
            );

            const titleBadgeWrap = (
                <div
                    className="inline-flex"
                    style={{
                        backgroundColor: "var(--cv-section-bg)",
                        color: "var(--cv-section-text)",
                        borderRadius: 10,
                    }}
                >
                    {titleNode}
                </div>
            );

            const rightControls = (
                <div className="flex items-center gap-2">
                    {sec.type === "list" ? (
                        <Button
                            small
                            variant="ghost"
                            title="Eintrag hinzufügen"
                            onClick={() => {
                                const isProjects = sectionId === "projects";

                                addListItem(
                                    sec.listKey,
                                    isProjects
                                        ? {
                                            // Projects template
                                            title: "Neues Projekt",
                                            meta: "Tech Stack (z.B. React, Node.js, ...)",
                                            bullets: ["Kurzbeschreibung / Ergebnis"],
                                            linkLabel: "Demo",
                                            linkHref: "https://",
                                        }
                                        : {
                                            // Default template (Experience/Education/etc.)
                                            date: "MM/JJJJ – MM/JJJJ",
                                            title: "Neuer Eintrag",
                                            location: "Ort / Institution",
                                            meta: "",
                                            bullets: ["Bullet"],
                                            linkLabel: "",
                                            linkHref: "",
                                        },
                                );
                            }}
                        >
                            + Eintrag
                        </Button>
                    ) : null}
                    <Button
                        small
                        variant="ghost"
                        title="Section löschen"
                        onClick={() => removeSection(sectionId)}
                    >
                        Löschen
                    </Button>
                </div>
            );

            if (sec.type === "text") {
                const key = sec.contentKey;
                return (
                    <SectionWrapper id={sectionId} key={sectionId}>
                        <SectionTitle
                            titleNode={titleBadgeWrap}
                            right={rightControls}
                        />
                        <EditableText
                            value={state[key] || ""}
                            onChange={(v) => setState((s) => ({...s, [key]: v}))}
                            className="mt-3 text-xs leading-relaxed"
                            placeholder="Text..."
                            multiline
                        />
                    </SectionWrapper>
                );
            }

            if (sec.type === "list") {
                const listKey = sec.listKey;
                const list = state[listKey] || [];
                const showLink =
                    sectionId === "projects" || String(listKey).startsWith("list_");

                return (
                    <SectionWrapper id={sectionId} key={sectionId}>
                        <SectionTitle
                            titleNode={titleBadgeWrap}
                            right={rightControls}
                        />
                        <DraggableItems
                            items={list}
                            setItems={setList(listKey)}
                            render={(it) => (
                                <ItemCard
                                    item={it}
                                    showLink={showLink}
                                    onChange={(next) => updateListItem(listKey, it.id, next)}
                                    onDelete={() => deleteListItem(listKey, it.id)}
                                />
                            )}
                        />
                    </SectionWrapper>
                );
            }

            return null;
        };

        const updateSettings = (patch) => {
            setState((s) => ({...s, settings: {...s.settings, ...patch}}));

        return (

                                onClick={() => window.print()}

                            <Button
                                variant="ghost"
                                onClick={resetAll}
                                title="Setzt alles auf den Startzustand zurück"

                                Reset
                            </Button>
                            <Button
                                variant="ghost"
                                onClick={() => setShowSettings((v) => !v)}
                                title="Abstände, Farben, Schrift"

                        <div className="flex flex-wrap items-center gap-2">

                                onClick={() => createSection("text")}

                            <Button
                                variant="ghost"

                            <div className="mt-3 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="rounded-xl p-3">
                                    <div
                                        className="text-xs font-semibold"
                                        style={{color: "var(--cv-heading)"}}
                                    >
                                        Abstände
                                    </div>

                                    <label
                                        className="mt-3 block text-xs"
                                        style={{color: "var(--cv-muted)"}}

                                                    sectionGap: Number(e.target.value),

                                        />

                                            className="mt-1 w-full"

                                    <div className="mt-3 grid grid-cols-3 gap-3">

                                        </label>
                                        <label
                                            className="block text-xs"
                                            style={{color: "var(--cv-muted)"}}

                                            <input
                                                className="mt-1 h-9 w-full"

                                        </label>
                                        <label
                                            className="block text-xs"
                                            style={{color: "var(--cv-muted)"}}

                                            Sekundär
                                            <input
                                                className="mt-1 h-9 w-full"
                                                type="color"
                                                value={state.settings.mutedColor}

                                                    updateSettings({mutedColor: e.target.value})
                                                }
                                            />
                                        </label>
                                    </div>

                                    <div className="mt-3 grid grid-cols-2 gap-3">
                                        <label
                                            className="block text-xs"
                                            style={{color: "var(--cv-muted)"}}

                                            Section Hintergrund
                                            <input
                                                className="mt-1 h-9 w-full"
                                                type="color"
                                                value={state.settings.sectionBgColor}
                                                onChange={(e) =>
                                                    updateSettings({sectionBgColor: e.target.value})
                                                }
                                            />
                                        </label>
                                        <label
                                            className="block text-xs"
                                            style={{color: "var(--cv-muted)"}}
                                        >
                                            Section Text
                                            <input
                                                className="mt-1 h-9 w-full"
                                                type="color"
                                                value={state.settings.sectionTitleColor}
                                                onChange={(e) =>
                                                    updateSettings({
                                                        sectionTitleColor: e.target.value,
                                                    })
                                                }
                                            />
                                        </label>
                                    </div>

                                    <div
                                        className="mt-3 text-xs"
                                        style={{color: "var(--cv-muted)"}}
                                    >
                                        Tipp (AT): Sehr dunkles Grau statt reines Schwarz wirkt
                                        oft cleaner.
                                    </div>
                                </div>
                            </div>
                        </div>
                    ) : null}

                    {/* CV PAGE */}
                    <div className="cv-shell bg-white rounded-2xl overflow-hidden shadow-sm print-no-shadow">
                        <div className="cv-grid grid grid-cols-1 md:grid-cols-[240px_1fr]">
                            {/* LEFT SIDEBAR */}
                            <aside className="cv-aside bg-neutral-50 border-r border-neutral-200 p-6">
                                {/* PHOTO */}
                                <div className="mb-5">
                                    <div
                                        className="w-full max-w-[180px] aspect-[4/5] rounded-2xl bg-white overflow-hidden flex items-center justify-center">
                                        {state.photo?.dataUrl ? (
                                            <img
                                                src={state.photo.dataUrl}
                                                alt="Foto"
                                                className="h-full w-full object-cover"
                                            />
                                        ) : (
                                            <div
                                                className="text-xs font-semibold"
                                                style={{color: "var(--cv-muted)"}}
                                            >
                                                Foto
                                            </div>
                                        )}
                                    </div>

                                    <div className="no-print mt-2 flex items-center justify-between gap-2">
                                        <label
                                            className="text-xs font-semibold"
                                            style={{color: "var(--cv-heading)"}}
                                        >
                                            Foto hochladen
                                            <input
                                                type="file"
                                                accept="image/*"
                                                className="block mt-1 text-xs"
                                                onChange={(e) =>
                                                    handlePhotoUpload(e.target.files?.[0])
                                                }
                                            />
                                        </label>
                                    </div>
                                </div>

                                {/* Sidebar titles also use same badge */}
                                {/* PERSONAL */}
                                <SectionTitle
                                    titleNode={
                                        <span
                                            className="inline-flex rounded"
                                            style={{
                                                backgroundColor: "var(--cv-section-bg)",
                                                color: "var(--cv-section-text)",
                                                borderRadius: 10,
                                            }}
                                        >
                                        <EditableText
                                            value={state.sidebarTitles?.personal || "Persönliche Daten"}
                                            onChange={(v) =>
                                                setState((s) => ({
                                                    ...s,
                                                    sidebarTitles: {...(s.sidebarTitles || {}), personal: v},
                                                }))
                                            }
                                            className="px-3 py-1 text-xs font-bold tracking-[0.22em] uppercase"
                                            placeholder="Titel"
                                        />
                                      </span>
                                    }
                                    right={
                                        <Button
                                            small
                                            variant="ghost"
                                            title="Neues Feld hinzufügen"
                                            onClick={() => {
                                                const key = window.prompt(
                                                    "Feldname (z.B. GitHub):",
                                                    "GitHub",
                                                );
                                                if (!key) return;
                                                setState((s) => ({
                                                    ...s,
                                                    personal: {...s.personal, [key]: "Wert"},
                                                }));
                                            }}
                                        >
                                            +
                                        </Button>
                                    }
                                />

                                <div className="mt-3 space-y-2">
                                    {Object.entries(state.personal).map(([k, v]) => (
                                        <div
                                            key={k}
                                            className="flex items-start justify-between gap-2"
                                        >
                                            <div className="min-w-0 flex-1">
                                                <SidebarField
                                                    label={k}
                                                    value={v}
                                                    onChange={(next) =>
                                                        setState((s) => ({
                                                            ...s,
                                                            personal: {...s.personal, [k]: next},
                                                        }))
                                                    }
                                                />
                                            </div>

                                            <button
                                                className="no-print text-xs hover:text-neutral-900 shrink-0"
                                                style={{color: "var(--cv-muted)"}}
                                                title="Feld entfernen"
                                                onClick={() =>
                                                    setState((s) => {
                                                        const next = {...s.personal};
                                                        delete next[k];

                                                    })

                                            </button>
                                        </div>
                                    ))}
                                </div>

                                {/* SKILLS */}
                                <SectionTitle
                                    titleNode={
                                        <span
                                            className="inline-flex rounded"
                                            style={{
                                                backgroundColor: "var(--cv-section-bg)",
                                                color: "var(--cv-section-text)",
                                                borderRadius: 10,
                                            }}
                                        >
                                            <EditableText
                                                value={state.sidebarTitles?.skills || "Skills"}
                                                onChange={(v) =>
                                                    setState((s) => ({
                                                        ...s,
                                                        sidebarTitles: {...(s.sidebarTitles || {}), skills: v},
                                                    }))
                                                }
                                                className="px-3 py-1 text-xs font-bold tracking-[0.22em] uppercase"
                                                placeholder="Titel"
                                            />
                                          </span>
                                    }
                                    right={
                                        <Button
                                            small
                                            variant="ghost"
                                            title="Neue Skill-Kategorie hinzufügen"
                                            onClick={() => {

                                                    "Kategorie (z.B. Cloud):",

                                                setState((s) => ({
                                                    ...s,
                                                    skills: {...s.skills, [key]: ""},

                                        >
                                            +

                        style={{color: "var(--cv-muted)"}}
                    >
                        Speicher-Key:{" "}
                        <code className="px-1 rounded bg-neutral-100">
                            {STORAGE_KEY}
                        </code>
                    </div>
                </div>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
